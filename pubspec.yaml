name: kids_app
description: A simple kids English learning app (Amharic support)
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_tts: ^4.2.5
  shared_preferences: ^2.2.3 
  riverpod: ^3.2.1  # for high score (we will use later)
  flutter_riverpod: ^3.3.1
  confetti: ^0.7.0
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/fruits/
    - assets/images/shapes/
    - assets/images/vehicles/
    - assets/sounds/