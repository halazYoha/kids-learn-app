name: kids_app
description: A simple kids English learning app (Amharic support)
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_tts: ^4.2.5
  shared_preferences: ^2.2.3
  flutter_riverpod: ^2.5.1
  confetti: ^0.7.0
  audioplayers: ^6.6.0
  flutter_launcher_icons: ^0.13.1
  video_player: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/fruits/
    - assets/images/shapes/
    - assets/images/vehicles/
    - assets/images/vegetables/
    - assets/sounds/
    - assets/videos/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"